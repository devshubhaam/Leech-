services:
  - type: web
    name: telegram-leech-bot
    runtime: python
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: python main.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: OWNER_ID
        sync: false
      - key: WEBHOOK_URL
        sync: false
      - key: PORT
        value: "8443"
      - key: DOWNLOAD_DIR
        value: /tmp/leech_downloads
      - key: MAX_DOWNLOAD_SIZE
        value: "419430400"
      - key: YTDLP_MAX_HEIGHT
        value: "720"
      - key: MEGA_EMAIL
        sync: false
      - key: MEGA_PASSWORD
        sync: false
    plan: free
